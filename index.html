<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>숙제 소분 플래너</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f8fafc;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :root {
    --shadow-border: 0px 0px 0px 1px rgba(0,0,0,0.06), 0px 1px 2px -1px rgba(0,0,0,0.06), 0px 2px 4px 0px rgba(0,0,0,0.04);
    --shadow-border-hover: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 1px 2px -1px rgba(0,0,0,0.08), 0px 2px 4px 0px rgba(0,0,0,0.06);
    --shadow-elevated: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 4px 8px -2px rgba(0,0,0,0.08), 0px 8px 16px -4px rgba(0,0,0,0.06);
  }

  h1, h2, h3 { text-wrap: balance; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }
  .stagger-item { opacity: 0; animation: fadeInUp 350ms ease-out forwards; }
  .stagger-item:nth-child(1) { animation-delay: 0ms; }
  .stagger-item:nth-child(2) { animation-delay: 80ms; }
  .stagger-item:nth-child(3) { animation-delay: 160ms; }
  .stagger-item:nth-child(4) { animation-delay: 240ms; }
  .stagger-item:nth-child(5) { animation-delay: 320ms; }
  .stagger-item:nth-child(6) { animation-delay: 400ms; }

  .progress-bar { transition: width 0.4s ease; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="js/config.js"></script>
<script type="text/babel" src="js/utils.js"></script>
<script type="text/babel" src="js/ui.js"></script>
<script type="text/babel" src="js/DatePicker.js"></script>
<script type="text/babel" src="js/StudentMyPage.js"></script>
<script type="text/babel" src="js/StudentManager.js"></script>
<script type="text/babel" src="js/CurriculumManager.js"></script>
<script type="text/babel" src="js/LessonManager.js"></script>
<script type="text/babel" src="js/TeacherView.js"></script>
<script type="text/babel" src="js/LoginPage.js"></script>
<script type="text/babel" src="js/App.js"></script>
<script type="text/babel" src="js/migrate_xp.js"></script>
</body>
</html>
