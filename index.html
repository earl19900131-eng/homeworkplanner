<style>
  * { box-sizing: border-box; }
  /* iOS 자동 확대 방지: input 포커스 시 font-size >= 16px 유지 */
  input, select, textarea { font-size: 16px !important; }
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(145deg, #f8fafc 0%, #f0f4ff 50%, #e8f0fe 100%);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  :root {
    --shadow-border: 0px 0px 0px 1px rgba(0,0,0,0.06), 0px 1px 2px -1px rgba(0,0,0,0.06), 0px 2px 4px 0px rgba(0,0,0,0.04);
    --shadow-border-hover: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 1px 2px -1px rgba(0,0,0,0.08), 0px 2px 4px 0px rgba(0,0,0,0.06);
    --shadow-elevated: 0px 0px 0px 1px rgba(0,0,0,0.08), 0px 4px 8px -2px rgba(0,0,0,0.08), 0px 8px 16px -4px rgba(0,0,0,0.06);
  }

  h1, h2, h3 { text-wrap: balance; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); filter: blur(4px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }
  .stagger-item { opacity: 0; animation: fadeInUp 350ms ease-out forwards; }
  .stagger-item:nth-child(1) { animation-delay: 0ms; }
  .stagger-item:nth-child(2) { animation-delay: 80ms; }
  .stagger-item:nth-child(3) { animation-delay: 160ms; }
  .stagger-item:nth-child(4) { animation-delay: 240ms; }
  .stagger-item:nth-child(5) { animation-delay: 320ms; }
  .stagger-item:nth-child(6) { animation-delay: 400ms; }

  .progress-bar { transition: width 0.4s ease; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        .catch(function(err) {

</script>
